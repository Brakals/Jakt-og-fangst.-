<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.json">
<title>Jakt App</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #1e293b;
  color: white;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.small {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1>🦌 Jakt & 🪤 Fellefangst</h1>

<button onclick="show('jakt')">Jakt</button>
<button onclick="show('felle')">Fellefangst</button>
<br><br>

<button onclick="exportData()">💾 Backup</button>
<input type="file" onchange="importData(event)"/>

<div id="content"></div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
